<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
<title>IPAM SIW — Maintenance</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0d1117;
      color: #e6edf3;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Grille de fond */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(88,166,255,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(88,166,255,.04) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
    }

    /* Halo d'ambiance */
    body::after {
      content: '';
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(88,166,255,.07) 0%, transparent 70%);
      pointer-events: none;
    }

    .card {
      position: relative;
      z-index: 1;
      background: rgba(22, 27, 34, 0.92);
      border: 1px solid rgba(48, 54, 61, 0.9);
      border-radius: 20px;
      padding: 52px 56px;
      max-width: 520px;
      width: calc(100% - 32px);
      text-align: center;
      backdrop-filter: blur(12px);
      box-shadow:
        0 0 0 1px rgba(88,166,255,.06),
        0 32px 80px rgba(0,0,0,.5),
        0 8px 24px rgba(0,0,0,.3);
    }

    /* Icône animée */
    .icon-wrap {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: rgba(88,166,255,.08);
      border: 1px solid rgba(88,166,255,.18);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 28px;
      position: relative;
    }
    .icon-wrap::before {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      border: 2px solid transparent;
      border-top-color: rgba(88,166,255,.4);
      animation: spin 2.5s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .icon-wrap svg { animation: pulse 2.5s ease-in-out infinite; }
    @keyframes pulse {
      0%, 100% { opacity: .7; transform: scale(1); }
      50%       { opacity: 1; transform: scale(1.08); }
    }

    /* Badge statut */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(210,153,34,.12);
      border: 1px solid rgba(210,153,34,.3);
      border-radius: 999px;
      padding: 4px 14px;
      font-size: 12px;
      font-weight: 600;
      color: #d29922;
      letter-spacing: .04em;
      text-transform: uppercase;
      margin-bottom: 20px;
    }
    .badge-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #d29922;
      animation: blink 1.4s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

    h1 {
      font-size: 26px;
      font-weight: 700;
      color: #e6edf3;
      margin-bottom: 14px;
      letter-spacing: -.02em;
    }

    .message {
      font-size: 15px;
      color: #8b949e;
      line-height: 1.65;
      margin-bottom: 28px;
    }

    /* Bloc fin prévue */
    .planned-block {
      background: rgba(88,166,255,.06);
      border: 1px solid rgba(88,166,255,.15);
      border-radius: 12px;
      padding: 16px 20px;
      margin-bottom: 28px;
    }
    .planned-block .label {
      font-size: 11px;
      color: #58a6ff;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .06em;
      margin-bottom: 6px;
    }
    #countdown {
      display: flex;
      justify-content: center;
      gap: 16px;
      flex-wrap: wrap;
    }
    .countdown-item {
      text-align: center;
    }
    .countdown-val {
      font-size: 28px;
      font-weight: 700;
      font-family: 'Courier New', monospace;
      color: #58a6ff;
      line-height: 1;
      display: block;
    }
    .countdown-lbl {
      font-size: 11px;
      color: #8b949e;
      margin-top: 4px;
      display: block;
    }
    .planned-date {
      font-size: 14px;
      color: #e6edf3;
      font-weight: 500;
    }

    /* Séparateur */
    .sep {
      border: none;
      border-top: 1px solid rgba(48,54,61,.8);
      margin: 0 0 24px;
    }

    /* Auto-refresh */
    .refresh-bar {
      font-size: 12px;
      color: #8b949e;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .refresh-progress {
      width: 120px;
      height: 3px;
      background: rgba(48,54,61,.8);
      border-radius: 999px;
      overflow: hidden;
    }
    .refresh-fill {
      height: 100%;
      background: #58a6ff;
      border-radius: 999px;
      transition: width 1s linear;
    }

    /* Marque en bas */
    .brand {
      margin-top: 36px;
      font-size: 11px;
      color: rgba(139,148,158,.4);
      letter-spacing: .04em;
    }
    .brand strong { color: rgba(139,148,158,.7); }
  </style>
</head>
<body>
  <div class="card">
    <!-- Icône -->
    <div class="icon-wrap">
      <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="#58a6ff" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
      </svg>
    </div>

    <!-- Badge -->
    <div class="badge"><span class="badge-dot"></span>En maintenance</div>

    <!-- Titre -->
    <h1>Site en maintenance</h1>

    <!-- Message -->
    <p class="message" id="maint-message">
      Le site est actuellement en cours de maintenance.<br>
      Merci de réessayer dans quelques minutes.
    </p>

    <!-- Fin prévue (masqué par défaut) -->
    <div class="planned-block" id="planned-block" style="display:none">
      <div class="label">Reprise prévue</div>
      <div class="planned-date" id="planned-date"></div>
      <div id="countdown" style="margin-top:14px"></div>
    </div>

    <hr class="sep">

    <!-- Barre de rafraîchissement auto -->
    <div class="refresh-bar">
      <span>Vérification dans <strong id="refresh-sec">30</strong>s</span>
      <div class="refresh-progress">
        <div class="refresh-fill" id="refresh-fill" style="width:100%"></div>
      </div>
    </div>

    <div class="brand">IPAM <strong>SIW</strong> v2</div>
  </div>

  <script>
    const REFRESH_INTERVAL = 30; // secondes

    let plannedEnd = null;
    let countdownTimer = null;
    let refreshTimer   = null;
    let refreshSecsLeft = REFRESH_INTERVAL;

    // ─── Fetch status depuis l'API ──────────────────────────────────────────
    async function fetchStatus() {
      try {
        const r = await fetch('/api/maintenance/status', { cache: 'no-store' });
        if (!r.ok) return null;
        return await r.json();
      } catch (_) { return null; }
    }

    async function refresh() {
      const data = await fetchStatus();

      // Si la maintenance est terminée, recharger le site principal
      if (data && !data.enabled) {
        window.location.replace('/');
        return;
      }

      if (data?.message) {
        document.getElementById('maint-message').textContent = data.message;
      }

      if (data?.plannedEnd) {
        plannedEnd = new Date(data.plannedEnd);
        showPlannedEnd();
      } else {
        plannedEnd = null;
        document.getElementById('planned-block').style.display = 'none';
        clearInterval(countdownTimer);
        countdownTimer = null;
      }

      resetRefreshBar();
    }

    // ─── Fin prévue & compte à rebours ─────────────────────────────────────
    function showPlannedEnd() {
      if (!plannedEnd) return;
      const block = document.getElementById('planned-block');
      block.style.display = '';

      document.getElementById('planned-date').textContent =
        plannedEnd.toLocaleString('fr-FR', {
          weekday: 'long', day: 'numeric', month: 'long',
          hour: '2-digit', minute: '2-digit',
        });

      if (countdownTimer) clearInterval(countdownTimer);
      updateCountdown();
      countdownTimer = setInterval(updateCountdown, 1000);
    }

    function updateCountdown() {
      if (!plannedEnd) return;
      const diff = plannedEnd - Date.now();
      if (diff <= 0) {
        document.getElementById('countdown').innerHTML =
          '<span style="color:#3fb950;font-size:14px;font-weight:600">Reprise imminente…</span>';
        return;
      }
      const h = Math.floor(diff / 3600000);
      const m = Math.floor((diff % 3600000) / 60000);
      const s = Math.floor((diff % 60000) / 1000);

      document.getElementById('countdown').innerHTML = [
        h > 0 ? { v: String(h).padStart(2,'0'), l: 'heure' + (h > 1 ? 's' : '') } : null,
        { v: String(m).padStart(2,'0'), l: 'min' },
        { v: String(s).padStart(2,'0'), l: 'sec' },
      ].filter(Boolean).map(({ v, l }) => `
        <div class="countdown-item">
          <span class="countdown-val">${v}</span>
          <span class="countdown-lbl">${l}</span>
        </div>
      `).join('');
    }

    // ─── Barre de rafraîchissement ──────────────────────────────────────────
    function resetRefreshBar() {
      clearInterval(refreshTimer);
      refreshSecsLeft = REFRESH_INTERVAL;
      updateRefreshBar();
      refreshTimer = setInterval(() => {
        refreshSecsLeft--;
        updateRefreshBar();
        if (refreshSecsLeft <= 0) refresh();
      }, 1000);
    }

    function updateRefreshBar() {
      const pct = (refreshSecsLeft / REFRESH_INTERVAL) * 100;
      document.getElementById('refresh-fill').style.width = pct + '%';
      document.getElementById('refresh-sec').textContent  = Math.max(0, refreshSecsLeft);
    }

    // ─── Init ───────────────────────────────────────────────────────────────
    refresh();
  </script>
</body>
</html>
