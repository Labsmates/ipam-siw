<!DOCTYPE html>
<html lang="fr">
<head>

<link rel="stylesheet" href="/vendor/fonts.css">

<style>
*{box-sizing:border-box}
body{background:#0d1117;color:#e6edf3;font-family:'Inter',system-ui,-apple-system,'Segoe UI',sans-serif;margin:0}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:#0d1117}
::-webkit-scrollbar-thumb{background:#30363d;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#58a6ff55}
*{scrollbar-width:thin;scrollbar-color:#30363d #0d1117}
.hidden{display:none!important}
input,button{-webkit-appearance:none;appearance:none}
input[type=checkbox],input[type=radio]{-webkit-appearance:auto;appearance:auto}
input:focus{outline:none;border-color:#58a6ff!important;-webkit-box-shadow:0 0 0 3px rgba(88,166,255,.15);box-shadow:0 0 0 3px rgba(88,166,255,.15)}
button:focus-visible{outline:2px solid #58a6ff;outline-offset:2px}
.spinner{width:36px;height:36px;border:3px solid #30363d;border-top-color:#58a6ff;border-radius:50%;-webkit-animation:sp .7s linear infinite;animation:sp .7s linear infinite}
@-webkit-keyframes sp{to{-webkit-transform:rotate(360deg);transform:rotate(360deg)}}
@keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<!-- NAV -->
<nav style="background:#161b22;border-bottom:1px solid #30363d;padding:0 24px;display:-webkit-box;display:-ms-flexbox;display:flex;-webkit-box-align:center;-ms-flex-align:center;align-items:center;-webkit-box-pack:justify;-ms-flex-pack:justify;justify-content:space-between;height:56px;position:-webkit-sticky;position:sticky;top:0;z-index:100;">
  <div style="display:-webkit-box;display:-ms-flexbox;display:flex;-webkit-box-align:center;-ms-flex-align:center;align-items:center;gap:16px;">
    <a href="/site.html" style="display:-webkit-box;display:-ms-flexbox;display:flex;-webkit-box-align:center;-ms-flex-align:center;align-items:center;gap:10px;text-decoration:none;">
      <div style="width:28px;height:28px;background:-webkit-linear-gradient(315deg,#58a6ff,#1f6feb);background:linear-gradient(135deg,#58a6ff,#1f6feb);border-radius:7px;display:-webkit-inline-box;display:-ms-inline-flexbox;display:inline-flex;-webkit-box-align:center;-ms-flex-align:center;align-items:center;-webkit-box-pack:center;-ms-flex-pack:center;justify-content:center;box-shadow:0 0 10px rgba(88,166,255,.3)">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="8" rx="2"/><rect x="2" y="14" width="20" height="8" rx="2"/><line x1="6" y1="6" x2="6.01" y2="6"/><line x1="6" y1="18" x2="6.01" y2="18"/></svg>
      </div>
      <span style="color:#e6edf3;font-weight:700;font-size:15px;letter-spacing:-.01em;">IPAM SIW</span>
    </a>
    <a href="/stats.html" style="color:#58a6ff;font-size:13px;text-decoration:none;display:-webkit-box;display:-ms-flexbox;display:flex;-webkit-box-align:center;-ms-flex-align:center;align-items:center;gap:5px">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      Statistiques
    </a>
    <a href="/export.html" style="color:#8b949e;font-size:13px;text-decoration:none;-webkit-transition:color .15s;transition:color .15s;display:-webkit-box;display:-ms-flexbox;display:flex;-webkit-box-align:center;-ms-flex-align:center;align-items:center;gap:5px" onmouseenter="this.style.color='#e6edf3'" onmouseleave="this.style.color='#8b949e'">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Export Excel
    </a>
    <a href="/archive.html" style="color:#8b949e;font-size:13px;text-decoration:none;-webkit-transition:color .15s;transition:color .15s;display:-webkit-box;display:-ms-flexbox;display:flex;-webkit-box-align:center;-ms-flex-align:center;align-items:center;gap:5px" onmouseenter="this.style.color='#e6edf3'" onmouseleave="this.style.color='#8b949e'">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.87"/></svg>
      Archive
    </a>
    <a id="nav-admin-link" href="/admin.html" class="hidden" style="color:#8b949e;font-size:13px;text-decoration:none;-webkit-transition:color .15s;transition:color .15s;display:-webkit-box;display:-ms-flexbox;display:flex;-webkit-box-align:center;-ms-flex-align:center;align-items:center;gap:5px" onmouseenter="this.style.color='#e6edf3'" onmouseleave="this.style.color='#8b949e'">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      Administration
    </a>
  </div>
  <div style="display:-webkit-box;display:-ms-flexbox;display:flex;-webkit-box-align:center;-ms-flex-align:center;align-items:center;gap:10px;">
    <div style="text-align:right;">
      <div id="nav-username" style="color:#e6edf3;font-size:13px;font-weight:600;"></div>
      <div id="nav-role" style="color:#8b949e;font-size:11px;"></div>
    </div>
    <button id="btn-logout" style="background:#f8514918;border:1px solid #f8514940;border-radius:8px;color:#f85149;font-size:12px;padding:6px 14px;cursor:pointer;-webkit-transition:all .15s;transition:all .15s;display:-webkit-inline-box;display:-ms-inline-flexbox;display:inline-flex;-webkit-box-align:center;-ms-flex-align:center;align-items:center;gap:5px" onmouseenter="this.style.background='#f8514930'" onmouseleave="this.style.background='#f8514918'">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      Déconnexion
    </button>
  </div>
</nav>

<!-- MAIN -->
<main style="max-width:1100px;margin:0 auto;padding:32px 24px;">

  <!-- Title -->
  <div style="margin-bottom:28px;">
    <h2 style="color:#e6edf3;font-size:20px;font-weight:700;margin:0;letter-spacing:-.02em;">Statistiques des serveurs</h2>
    <p id="stats-subtitle" style="color:#8b949e;font-size:13px;margin:4px 0 0;"></p>
  </div>

  <!-- Loading state -->
  <div id="stats-loading" style="display:-webkit-box;display:-ms-flexbox;display:flex;-webkit-box-orient:vertical;-webkit-box-direction:normal;-ms-flex-direction:column;flex-direction:column;-webkit-box-align:center;-ms-flex-align:center;align-items:center;gap:16px;padding:80px 24px;">
    <div class="spinner"></div>
    <p id="stats-loading-msg" style="color:#8b949e;font-size:13px;margin:0;">Chargement des données…</p>
  </div>

  <!-- Content (hidden while loading) -->
  <div id="stats-content" class="hidden">

    <!-- Global counters -->
    <div style="display:-webkit-box;display:-ms-flexbox;display:flex;gap:16px;margin-bottom:28px;-ms-flex-wrap:wrap;flex-wrap:wrap;">

      <div style="-webkit-box-flex:1;-ms-flex:1 1 200px;flex:1 1 200px;background:#161b22;border:1px solid #30363d;border-radius:12px;padding:24px;">
        <div style="display:-webkit-box;display:-ms-flexbox;display:flex;-webkit-box-align:center;-ms-flex-align:center;align-items:center;gap:10px;margin-bottom:12px;">
          <div style="width:34px;height:34px;background:#0d2240;border-radius:8px;display:-webkit-inline-box;display:-ms-inline-flexbox;display:inline-flex;-webkit-box-align:center;-ms-flex-align:center;align-items:center;-webkit-box-pack:center;-ms-flex-pack:center;justify-content:center;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#58a6ff" stroke-width="2"><rect x="2" y="2" width="20" height="8" rx="2"/><rect x="2" y="14" width="20" height="8" rx="2"/></svg>
          </div>
          <span style="font-size:13px;font-weight:600;color:#8b949e;">Serveurs Windows</span>
        </div>
        <div id="count-windows" style="font-size:36px;font-weight:700;color:#58a6ff;letter-spacing:-.03em;">—</div>
        <div style="font-size:12px;color:#484f58;margin-top:4px;">Pattern: XXXXXXXX-RRZZ</div>
      </div>

      <div style="-webkit-box-flex:1;-ms-flex:1 1 200px;flex:1 1 200px;background:#161b22;border:1px solid #30363d;border-radius:12px;padding:24px;">
        <div style="display:-webkit-box;display:-ms-flexbox;display:flex;-webkit-box-align:center;-ms-flex-align:center;align-items:center;gap:10px;margin-bottom:12px;">
          <div style="width:34px;height:34px;background:#0d2e1a;border-radius:8px;display:-webkit-inline-box;display:-ms-inline-flexbox;display:inline-flex;-webkit-box-align:center;-ms-flex-align:center;align-items:center;-webkit-box-pack:center;-ms-flex-pack:center;justify-content:center;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#3fb950" stroke-width="2"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>
          </div>
          <span style="font-size:13px;font-weight:600;color:#8b949e;">Serveurs Linux</span>
        </div>
        <div id="count-linux" style="font-size:36px;font-weight:700;color:#3fb950;letter-spacing:-.03em;">—</div>
        <div style="font-size:12px;color:#484f58;margin-top:4px;">Domaine: .sf.intra.laposte.fr</div>
      </div>

      <div style="-webkit-box-flex:1;-ms-flex:1 1 200px;flex:1 1 200px;background:#161b22;border:1px solid #30363d;border-radius:12px;padding:24px;">
        <div style="display:-webkit-box;display:-ms-flexbox;display:flex;-webkit-box-align:center;-ms-flex-align:center;align-items:center;gap:10px;margin-bottom:12px;">
          <div style="width:34px;height:34px;background:#21262d;border-radius:8px;display:-webkit-inline-box;display:-ms-inline-flexbox;display:inline-flex;-webkit-box-align:center;-ms-flex-align:center;align-items:center;-webkit-box-pack:center;-ms-flex-pack:center;justify-content:center;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#8b949e" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          </div>
          <span style="font-size:13px;font-weight:600;color:#8b949e;">Total analysés</span>
        </div>
        <div id="count-total" style="font-size:36px;font-weight:700;color:#e6edf3;letter-spacing:-.03em;">—</div>
        <div style="font-size:12px;color:#484f58;margin-top:4px;">IPs utilisées avec hostname</div>
      </div>

    </div>

    <!-- Windows by role -->
    <div style="background:#161b22;border:1px solid #30363d;border-radius:12px;overflow:hidden;margin-bottom:28px;">
      <div style="padding:16px 20px;border-bottom:1px solid #30363d;display:-webkit-box;display:-ms-flexbox;display:flex;-webkit-box-align:center;-ms-flex-align:center;align-items:center;gap:10px;">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="#58a6ff"><rect x="2" y="2" width="9" height="9"/><rect x="13" y="2" width="9" height="9"/><rect x="2" y="13" width="9" height="9"/><rect x="13" y="13" width="9" height="9"/></svg>
        <h3 style="color:#e6edf3;font-size:15px;font-weight:700;margin:0;">Serveurs Windows par rôle</h3>
      </div>
      <div id="roles-grid-win" style="display:-webkit-box;display:-ms-flexbox;display:flex;-ms-flex-wrap:wrap;flex-wrap:wrap;gap:0;"></div>
    </div>

    <!-- Linux by role -->
    <div style="background:#161b22;border:1px solid #30363d;border-radius:12px;overflow:hidden;margin-bottom:28px;">
      <div style="padding:16px 20px;border-bottom:1px solid #30363d;display:-webkit-box;display:-ms-flexbox;display:flex;-webkit-box-align:center;-ms-flex-align:center;align-items:center;gap:10px;">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#3fb950" stroke-width="2"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>
        <h3 style="color:#e6edf3;font-size:15px;font-weight:700;margin:0;">Serveurs Linux par rôle</h3>
      </div>
      <div id="roles-grid-lin" style="display:-webkit-box;display:-ms-flexbox;display:flex;-ms-flex-wrap:wrap;flex-wrap:wrap;gap:0;"></div>
    </div>

  </div>
</main>

<script type="module" src="/js/stats.js"></script>
</body>
</html>
