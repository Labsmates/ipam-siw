<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPAM SIW — Connexion</title>
<link rel="stylesheet" href="/vendor/fonts.css">
<link rel="stylesheet" href="/css/theme.css">
<script src="/js/protect.js"></script>
<script src="/vendor/tailwind.min.js"></script>
<style>
*{box-sizing:border-box}
body{background:var(--bg-1);color:var(--tx-1);font-family:'Inter',system-ui,-apple-system,'Segoe UI',sans-serif;margin:0}
.inp{width:100%;background:var(--bg-1);border:1px solid var(--brd);border-radius:8px;padding:10px 14px;color:var(--tx-1);font-size:14px;outline:none;-webkit-transition:border-color .15s;transition:border-color .15s;-webkit-appearance:none;appearance:none}
.inp:focus{border-color:#58a6ff!important;-webkit-box-shadow:0 0 0 3px rgba(88,166,255,.15);box-shadow:0 0 0 3px rgba(88,166,255,.15)}
.inp::placeholder{color:var(--tx-3)}
.btn{display:-webkit-inline-box;display:-ms-inline-flexbox;display:inline-flex;-webkit-box-align:center;-ms-flex-align:center;align-items:center;-webkit-box-pack:center;-ms-flex-pack:center;justify-content:center;gap:6px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;-webkit-transition:all .15s;transition:all .15s;border:none;padding:11px 16px;outline:none;-webkit-appearance:none;appearance:none;width:100%}
.btn:active{-webkit-transform:scale(.98);transform:scale(.98)}
.btn:focus-visible{outline:2px solid #58a6ff;outline-offset:2px}
.btn-p{background:#58a6ff;color:var(--bg-1)}.btn-p:hover{background:#79b8ff}
.hidden{display:none!important}
button{-webkit-appearance:none;appearance:none}
.link-btn{background:none;border:none;color:#58a6ff;font-size:13px;cursor:pointer;padding:0;text-decoration:underline;font-family:inherit}
.link-btn:hover{color:#79b8ff}
</style>
</head>
<body style="display:-webkit-box;display:-ms-flexbox;display:flex;-webkit-box-align:center;-ms-flex-align:center;align-items:center;-webkit-box-pack:center;-ms-flex-pack:center;justify-content:center;min-height:100vh;padding:24px;background:radial-gradient(ellipse at 30% 40%,rgba(88,166,255,.06) 0%,transparent 60%),radial-gradient(ellipse at 70% 70%,rgba(63,185,80,.06) 0%,transparent 50%),var(--bg-1);">

<button id="btn-theme" title="Passer en mode clair" style="position:fixed;top:16px;right:16px;padding:7px 10px;border-radius:8px;border:1px solid var(--brd);background:var(--bg-4);color:var(--tx-3);cursor:pointer;display:-webkit-inline-box;display:-ms-inline-flexbox;display:inline-flex;-webkit-box-align:center;-ms-flex-align:center;align-items:center;-webkit-transition:all .15s;transition:all .15s" onmouseenter="this.style.background='var(--bg-hover)';this.style.color='var(--tx-1)'" onmouseleave="this.style.background='var(--bg-4)';this.style.color='var(--tx-3)'"></button>

<div style="position:relative;width:380px;max-width:95vw">

  <div style="text-align:center;margin-bottom:32px">
    <div style="width:52px;height:52px;background:-webkit-linear-gradient(315deg,#58a6ff,#1f6feb);background:linear-gradient(135deg,#58a6ff,#1f6feb);border-radius:14px;display:-webkit-inline-box;display:-ms-inline-flexbox;display:inline-flex;-webkit-box-align:center;-ms-flex-align:center;align-items:center;-webkit-box-pack:center;-ms-flex-pack:center;justify-content:center;margin-bottom:16px;box-shadow:0 0 32px rgba(88,166,255,.3)">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="2" width="20" height="8" rx="2"/>
        <rect x="2" y="14" width="20" height="8" rx="2"/>
        <line x1="6" y1="6" x2="6.01" y2="6"/>
        <line x1="6" y1="18" x2="6.01" y2="18"/>
      </svg>
    </div>
    <h1 style="font-size:24px;font-weight:700;letter-spacing:-0.03em;margin:0 0 6px">IPAM SIW</h1>
    <p style="font-size:14px;color:var(--tx-3);margin:0">Gestion des adresses IP</p>
  </div>

  <!-- ── Formulaire de connexion ── -->
  <div id="box-login" style="background:var(--bg-2);border:1px solid var(--brd);border-radius:12px;padding:28px;box-shadow:0 20px 60px rgba(0,0,0,.6)">
    <form id="login-form" novalidate>

      <div style="margin-bottom:16px">
        <label style="font-size:13px;font-weight:500;display:block;margin-bottom:7px">Identifiant</label>
        <input id="username" class="inp" type="text" placeholder="Nom d'utilisateur" autocomplete="username" autocapitalize="none">
      </div>

      <div style="margin-bottom:20px">
        <label style="font-size:13px;font-weight:500;display:block;margin-bottom:7px">Mot de passe</label>
        <div style="position:relative">
          <input id="password" class="inp" type="password" placeholder="••••••••••" autocomplete="current-password" style="padding-right:42px">
          <button type="button" id="toggle-pwd" style="position:absolute;right:11px;top:50%;-webkit-transform:translateY(-50%);transform:translateY(-50%);background:none;border:none;color:var(--tx-3);cursor:pointer;padding:4px;-webkit-appearance:none;appearance:none" title="Afficher/masquer le mot de passe">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>

      <div id="login-error" class="hidden" style="font-size:13px;color:#f85149;background:#f8514912;border:1px solid #f8514930;border-radius:7px;padding:9px 12px;margin-bottom:16px"></div>

      <button id="btn-login" type="submit" class="btn btn-p">Se connecter</button>

    </form>

    <div style="text-align:center;margin-top:16px">
      <button class="link-btn" id="btn-show-register">Créer un compte</button>
    </div>
  </div>

  <!-- ── Formulaire de demande de compte ── -->
  <div id="box-register" class="hidden" style="background:var(--bg-2);border:1px solid var(--brd);border-radius:12px;padding:28px;box-shadow:0 20px 60px rgba(0,0,0,.6)">
    <div style="font-size:16px;font-weight:700;margin-bottom:20px">Demande de création de compte</div>
    <form id="register-form" novalidate>

      <div style="margin-bottom:14px">
        <label style="font-size:13px;font-weight:500;display:block;margin-bottom:7px">Nom et Prénom <span style="color:#f85149">*</span></label>
        <input id="reg-fullname" class="inp" type="text" placeholder="ex: Jean CLOUD" autocomplete="name">
      </div>

      <div style="margin-bottom:14px">
        <label style="font-size:13px;font-weight:500;display:block;margin-bottom:7px">Identifiant (code IDRH) <span style="color:#f85149">*</span></label>
        <input id="reg-username" class="inp" type="text" placeholder="ex: PJFY579" autocapitalize="characters" maxlength="7" style="text-transform:uppercase;font-family:monospace;letter-spacing:.05em">
        <div style="font-size:11px;color:var(--tx-3);margin-top:5px">Commence par P ou X · 3 lettres · 3 chiffres</div>
      </div>

      <div style="margin-bottom:20px">
        <label style="font-size:13px;font-weight:500;display:block;margin-bottom:7px">Mot de passe <span style="color:#f85149">*</span></label>
        <input id="reg-password" class="inp" type="password" placeholder="Minimum 8 caractères" autocomplete="new-password">
      </div>

      <div id="register-error" class="hidden" style="font-size:13px;color:#f85149;background:#f8514912;border:1px solid #f8514930;border-radius:7px;padding:9px 12px;margin-bottom:16px"></div>

      <button id="btn-register" type="submit" class="btn btn-p">Envoyer la demande</button>

    </form>

    <div style="text-align:center;margin-top:16px">
      <button class="link-btn" id="btn-show-login">&#8592; Retour à la connexion</button>
    </div>
  </div>

  <p style="text-align:center;font-size:12px;color:var(--brd);margin-top:20px">IPAM SIW v2.1 · JWT · Timeout 20 min</p>
  <p style="text-align:center;font-size:11px;color:var(--tx-5);margin-top:4px">Copyright &copy; SWI <span id="footer-year"></span>. Tous droits réservés.</p>

</div>

<script>
  document.getElementById('footer-year').textContent = new Date().getFullYear();
  document.getElementById('toggle-pwd').addEventListener('click', function() {
    var inp = document.getElementById('password');
    var isText = inp.type === 'text';
    inp.type = isText ? 'password' : 'text';
    this.style.color = isText ? 'var(--tx-3)' : '#58a6ff';
  });
</script>
<script type="module" src="/js/auth.js"></script>
</body>
</html>
