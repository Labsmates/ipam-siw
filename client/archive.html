<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPAM SIW — Archive des libérations</title>
<link rel="stylesheet" href="/vendor/fonts.css">
<link rel="stylesheet" href="/css/theme.css">
<script src="/js/protect.js"></script>
<script src="/vendor/tailwind.min.js"></script>
<style>
*{box-sizing:border-box}
body{background:var(--bg-1);color:var(--tx-1);font-family:'Inter',system-ui,-apple-system,'Segoe UI',sans-serif;margin:0}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg-1)}
::-webkit-scrollbar-thumb{background:var(--brd);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#58a6ff55}
*{scrollbar-width:thin;scrollbar-color:var(--brd) var(--bg-1)}
.hidden{display:none!important}
input,button{-webkit-appearance:none;appearance:none}
input:focus{outline:none;border-color:#58a6ff!important;-webkit-box-shadow:0 0 0 3px rgba(88,166,255,.15);box-shadow:0 0 0 3px rgba(88,166,255,.15)}
button:focus-visible{outline:2px solid #58a6ff;outline-offset:2px}
.spinner{width:36px;height:36px;border:3px solid var(--brd);border-top-color:#58a6ff;border-radius:50%;-webkit-animation:sp .7s linear infinite;animation:sp .7s linear infinite}
@-webkit-keyframes sp{to{-webkit-transform:rotate(360deg);transform:rotate(360deg)}}
@keyframes sp{to{transform:rotate(360deg)}}
.nav-link{color:var(--tx-3);font-size:13px;text-decoration:none;-webkit-transition:color .15s;transition:color .15s;display:-webkit-box;display:-ms-flexbox;display:flex;-webkit-box-align:center;-ms-flex-align:center;align-items:center;gap:5px}
.nav-link:hover{color:var(--tx-1)}
.nav-link.active{color:#58a6ff}
table{border-collapse:collapse;width:100%}
th{text-align:left}
</style>
</head>
<body>

<!-- NAV -->
<nav style="background:var(--bg-2);border-bottom:1px solid var(--brd);padding:0 24px;display:-webkit-box;display:-ms-flexbox;display:flex;-webkit-box-align:center;-ms-flex-align:center;align-items:center;-webkit-box-pack:justify;-ms-flex-pack:justify;justify-content:space-between;height:56px;position:-webkit-sticky;position:sticky;top:0;z-index:100;">
  <div style="display:-webkit-box;display:-ms-flexbox;display:flex;-webkit-box-align:center;-ms-flex-align:center;align-items:center;gap:16px;">
    <a href="/site.html" style="display:-webkit-box;display:-ms-flexbox;display:flex;-webkit-box-align:center;-ms-flex-align:center;align-items:center;gap:10px;text-decoration:none;">
      <div style="width:28px;height:28px;background:-webkit-linear-gradient(315deg,#58a6ff,#1f6feb);background:linear-gradient(135deg,#58a6ff,#1f6feb);border-radius:7px;display:-webkit-inline-box;display:-ms-inline-flexbox;display:inline-flex;-webkit-box-align:center;-ms-flex-align:center;align-items:center;-webkit-box-pack:center;-ms-flex-pack:center;justify-content:center;box-shadow:0 0 10px rgba(88,166,255,.3)">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="8" rx="2"/><rect x="2" y="14" width="20" height="8" rx="2"/><line x1="6" y1="6" x2="6.01" y2="6"/><line x1="6" y1="18" x2="6.01" y2="18"/></svg>
      </div>
      <span style="color:var(--tx-1);font-weight:700;font-size:15px;letter-spacing:-.01em;">IPAM SIW</span>
    </a>
    <a href="/stats.html" class="nav-link">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      Statistiques
    </a>
    <a href="/export.html" class="nav-link">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Export Excel
    </a>
    <a href="/archive.html" class="nav-link active">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.87"/></svg>
      Archive
    </a>
    <a id="nav-admin-link" href="/admin.html" class="nav-link hidden">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      Administration
    </a>
    <a id="nav-config-link" href="/config.html" class="nav-link hidden">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2"/></svg>
      Configuration
    </a>
    <a href="/ipcalc.html" class="nav-link">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      Calculateur IP
    </a>
  </div>
  <div style="display:-webkit-box;display:-ms-flexbox;display:flex;-webkit-box-align:center;-ms-flex-align:center;align-items:center;gap:10px;">
    <div style="text-align:right;">
      <div id="nav-username" style="color:var(--tx-1);font-size:13px;font-weight:600;"></div>
      <div id="nav-role" style="color:var(--tx-3);font-size:11px;"></div>
    </div>
    <button id="btn-theme" title="Passer en mode clair" style="-ms-flex-negative:0;flex-shrink:0;padding:6px 10px;border-radius:6px;border:1px solid var(--brd);background:var(--bg-4);color:var(--tx-3);cursor:pointer;-webkit-appearance:none;appearance:none;-webkit-transition:all .15s;transition:all .15s;display:-webkit-inline-box;display:-ms-inline-flexbox;display:inline-flex;-webkit-box-align:center;-ms-flex-align:center;align-items:center"></button>
    <button id="btn-logout" style="background:#f8514918;border:1px solid #f8514940;border-radius:8px;color:#f85149;font-size:12px;padding:6px 14px;cursor:pointer;-webkit-transition:all .15s;transition:all .15s;display:-webkit-inline-box;display:-ms-inline-flexbox;display:inline-flex;-webkit-box-align:center;-ms-flex-align:center;align-items:center;gap:5px" onmouseenter="this.style.background='#f8514930'" onmouseleave="this.style.background='#f8514918'">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      Déconnexion
    </button>
  </div>
</nav>

<!-- MAIN -->
<main style="max-width:1100px;margin:0 auto;padding:32px 24px;">

  <!-- Title -->
  <div style="margin-bottom:28px;">
    <h2 style="color:var(--tx-1);font-size:20px;font-weight:700;margin:0;letter-spacing:-.02em;">Archive des libérations</h2>
    <p id="archive-subtitle" style="color:var(--tx-3);font-size:13px;margin:4px 0 0;">Historique des hostnames libérés avec leur IP, date et utilisateur</p>
  </div>

  <!-- Search + counter -->
  <div style="display:-webkit-box;display:-ms-flexbox;display:flex;-webkit-box-align:center;-ms-flex-align:center;align-items:center;gap:12px;margin-bottom:16px;">
    <div style="position:relative;-webkit-box-flex:1;-ms-flex:1;flex:1;max-width:360px;">
      <svg style="position:absolute;left:10px;top:50%;-webkit-transform:translateY(-50%);transform:translateY(-50%);color:var(--tx-3);pointer-events:none" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input id="search-input" placeholder="Filtrer par hostname, IP ou utilisateur…" style="width:100%;background:var(--bg-2);border:1px solid var(--brd);border-radius:8px;padding:8px 12px 8px 32px;color:var(--tx-1);font-size:13px;outline:none;-webkit-transition:border-color .15s;transition:border-color .15s">
    </div>
    <div id="counter" style="font-size:13px;color:var(--tx-3);-ms-flex-negative:0;flex-shrink:0;"></div>
  </div>

  <!-- Loading -->
  <div id="archive-loading" style="display:-webkit-box;display:-ms-flexbox;display:flex;-webkit-box-orient:vertical;-webkit-box-direction:normal;-ms-flex-direction:column;flex-direction:column;-webkit-box-align:center;-ms-flex-align:center;align-items:center;gap:16px;padding:80px 24px;">
    <div class="spinner"></div>
    <p style="color:var(--tx-3);font-size:13px;margin:0;">Chargement de l'archive…</p>
  </div>

  <!-- Table -->
  <div id="archive-content" class="hidden" style="background:var(--bg-2);border:1px solid var(--brd);border-radius:12px;overflow:hidden;">
    <table>
      <thead>
        <tr style="border-bottom:1px solid var(--brd);">
          <th style="padding:12px 16px;font-size:12px;font-weight:600;color:var(--tx-3);text-transform:uppercase;letter-spacing:.05em;">Hostname</th>
          <th style="padding:12px 16px;font-size:12px;font-weight:600;color:var(--tx-3);text-transform:uppercase;letter-spacing:.05em;">Adresse IP</th>
          <th style="padding:12px 16px;font-size:12px;font-weight:600;color:var(--tx-3);text-transform:uppercase;letter-spacing:.05em;">Date</th>
          <th style="padding:12px 16px;font-size:12px;font-weight:600;color:var(--tx-3);text-transform:uppercase;letter-spacing:.05em;">Utilisateur</th>
        </tr>
      </thead>
      <tbody id="archive-tbody"></tbody>
    </table>
    <div id="archive-empty" class="hidden" style="padding:48px;text-align:center;color:var(--tx-4);font-size:13px;">Aucune libération enregistrée</div>
  </div>

</main>

<script type="module" src="/js/archive.js"></script>
</body>
</html>
