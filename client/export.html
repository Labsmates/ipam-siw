<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPAM SIW — Export Excel</title>
<link rel="stylesheet" href="/vendor/fonts.css">
<script src="/js/protect.js"></script>
<script src="/vendor/tailwind.min.js"></script>
<script src="/vendor/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box}
body{background:#0d1117;color:#e6edf3;font-family:'Inter',system-ui,-apple-system,'Segoe UI',sans-serif;margin:0}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:#0d1117}
::-webkit-scrollbar-thumb{background:#30363d;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#58a6ff55}
*{scrollbar-width:thin;scrollbar-color:#30363d #0d1117}
.hidden{display:none!important}
input,select,button{-webkit-appearance:none;appearance:none}
input[type=checkbox],input[type=radio]{-webkit-appearance:auto;appearance:auto}
input:focus,select:focus{outline:none;border-color:#58a6ff!important;-webkit-box-shadow:0 0 0 3px rgba(88,166,255,.15);box-shadow:0 0 0 3px rgba(88,166,255,.15)}
button:focus-visible{outline:2px solid #58a6ff;outline-offset:2px}
.inp{width:100%;background:#0d1117;border:1px solid #30363d;border-radius:8px;padding:10px 14px;color:#e6edf3;font-size:14px;outline:none;-webkit-transition:border-color .15s;transition:border-color .15s}
.inp:focus{border-color:#58a6ff!important;-webkit-box-shadow:0 0 0 3px rgba(88,166,255,.15);box-shadow:0 0 0 3px rgba(88,166,255,.15)}
.inp::placeholder{color:#8b949e}
.btn{display:-webkit-inline-box;display:-ms-inline-flexbox;display:inline-flex;-webkit-box-align:center;-ms-flex-align:center;align-items:center;gap:6px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;-webkit-transition:all .15s;transition:all .15s;border:none;padding:8px 16px;outline:none}
.btn:active{-webkit-transform:scale(.97);transform:scale(.97)}
.btn-p{background:#58a6ff;color:#0d1117}.btn-p:hover{background:#79b8ff}
.btn-g{background:#21262d;color:#e6edf3;border:1px solid #30363d}.btn-g:hover{background:#2d333b}
.btn-sm{padding:5px 11px;font-size:12px;border-radius:6px}
</style>
</head>
<body>

<!-- NAV -->
<nav style="background:#161b22;border-bottom:1px solid #30363d;padding:0 24px;display:-webkit-box;display:-ms-flexbox;display:flex;-webkit-box-align:center;-ms-flex-align:center;align-items:center;-webkit-box-pack:justify;-ms-flex-pack:justify;justify-content:space-between;height:56px;position:-webkit-sticky;position:sticky;top:0;z-index:100;">
  <div style="display:-webkit-box;display:-ms-flexbox;display:flex;-webkit-box-align:center;-ms-flex-align:center;align-items:center;gap:16px;">
    <a href="/site.html" style="display:-webkit-box;display:-ms-flexbox;display:flex;-webkit-box-align:center;-ms-flex-align:center;align-items:center;gap:10px;text-decoration:none;">
      <div style="width:28px;height:28px;background:-webkit-linear-gradient(315deg,#58a6ff,#1f6feb);background:linear-gradient(135deg,#58a6ff,#1f6feb);border-radius:7px;display:-webkit-inline-box;display:-ms-inline-flexbox;display:inline-flex;-webkit-box-align:center;-ms-flex-align:center;align-items:center;-webkit-box-pack:center;-ms-flex-pack:center;justify-content:center;box-shadow:0 0 10px rgba(88,166,255,.3)">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="8" rx="2"/><rect x="2" y="14" width="20" height="8" rx="2"/><line x1="6" y1="6" x2="6.01" y2="6"/><line x1="6" y1="18" x2="6.01" y2="18"/></svg>
      </div>
      <span style="color:#e6edf3;font-weight:700;font-size:15px;letter-spacing:-.01em;">IPAM SIW</span>
    </a>
    <a href="/dashboard.html" style="color:#8b949e;font-size:13px;text-decoration:none;-webkit-transition:color .15s;transition:color .15s;display:-webkit-box;display:-ms-flexbox;display:flex;-webkit-box-align:center;-ms-flex-align:center;align-items:center;gap:5px" onmouseenter="this.style.color='#e6edf3'" onmouseleave="this.style.color='#8b949e'">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
      Tableau de Bord
    </a>
    <a href="/stats.html" style="color:#8b949e;font-size:13px;text-decoration:none;-webkit-transition:color .15s;transition:color .15s;display:-webkit-box;display:-ms-flexbox;display:flex;-webkit-box-align:center;-ms-flex-align:center;align-items:center;gap:5px" onmouseenter="this.style.color='#e6edf3'" onmouseleave="this.style.color='#8b949e'">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      Statistiques
    </a>
    <a href="/export.html" style="color:#58a6ff;font-size:13px;text-decoration:none;display:-webkit-box;display:-ms-flexbox;display:flex;-webkit-box-align:center;-ms-flex-align:center;align-items:center;gap:5px">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Export Excel
    </a>
    <a href="/archive.html" style="color:#8b949e;font-size:13px;text-decoration:none;-webkit-transition:color .15s;transition:color .15s;display:-webkit-box;display:-ms-flexbox;display:flex;-webkit-box-align:center;-ms-flex-align:center;align-items:center;gap:5px" onmouseenter="this.style.color='#e6edf3'" onmouseleave="this.style.color='#8b949e'">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.87"/></svg>
      Archive
    </a>
    <a id="nav-admin-link" href="/admin.html" class="hidden" style="color:#8b949e;font-size:13px;text-decoration:none;-webkit-transition:color .15s;transition:color .15s;display:-webkit-box;display:-ms-flexbox;display:flex;-webkit-box-align:center;-ms-flex-align:center;align-items:center;gap:5px" onmouseenter="this.style.color='#e6edf3'" onmouseleave="this.style.color='#8b949e'">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      Administration
    </a>
    <a id="nav-config-link" href="/config.html" class="hidden" style="color:#8b949e;font-size:13px;text-decoration:none;-webkit-transition:color .15s;transition:color .15s;display:-webkit-box;display:-ms-flexbox;display:flex;-webkit-box-align:center;-ms-flex-align:center;align-items:center;gap:5px" onmouseenter="this.style.color='#e6edf3'" onmouseleave="this.style.color='#8b949e'">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2"/></svg>
      Configuration
    </a>
  </div>
  <div style="display:-webkit-box;display:-ms-flexbox;display:flex;-webkit-box-align:center;-ms-flex-align:center;align-items:center;gap:10px;">
    <div style="text-align:right;">
      <div id="nav-username" style="color:#e6edf3;font-size:13px;font-weight:600;"></div>
      <div id="nav-role" style="color:#8b949e;font-size:11px;"></div>
    </div>
    <button id="btn-logout" style="background:#f8514918;border:1px solid #f8514940;border-radius:8px;color:#f85149;font-size:12px;padding:6px 14px;cursor:pointer;-webkit-transition:all .15s;transition:all .15s;display:-webkit-inline-box;display:-ms-inline-flexbox;display:inline-flex;-webkit-box-align:center;-ms-flex-align:center;align-items:center;gap:5px" onmouseenter="this.style.background='#f8514930'" onmouseleave="this.style.background='#f8514918'">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      Déconnexion
    </button>
  </div>
</nav>

<!-- MAIN -->
<main style="max-width:1100px;margin:0 auto;padding:32px 24px;">

  <div style="display:-webkit-box;display:-ms-flexbox;display:flex;-webkit-box-align:center;-ms-flex-align:center;align-items:center;-webkit-box-pack:justify;-ms-flex-pack:justify;justify-content:space-between;margin-bottom:24px;">
    <div>
      <h2 style="color:#e6edf3;font-size:20px;font-weight:700;margin:0;letter-spacing:-.02em;">Export Excel</h2>
      <p style="color:#8b949e;font-size:13px;margin:4px 0 0;">Exportez les données IP en fichier Excel</p>
    </div>
    <button id="btn-do-export" class="btn btn-p">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Télécharger
    </button>
  </div>

  <div style="display:-webkit-box;display:-ms-flexbox;display:flex;gap:20px;-webkit-box-align:start;-ms-flex-align:start;align-items:flex-start;-ms-flex-wrap:wrap;flex-wrap:wrap;">

    <!-- Sites -->
    <div style="-webkit-box-flex:1;-ms-flex:1 1 340px;flex:1 1 340px;background:#161b22;border:1px solid #30363d;border-radius:10px;overflow:hidden">
      <div style="padding:12px 16px;border-bottom:1px solid #30363d;display:-webkit-box;display:-ms-flexbox;display:flex;-webkit-box-align:center;-ms-flex-align:center;align-items:center;-webkit-box-pack:justify;-ms-flex-pack:justify;justify-content:space-between">
        <span style="font-size:13px;font-weight:600;color:#e6edf3">Sélection des sites</span>
        <div style="display:-webkit-box;display:-ms-flexbox;display:flex;gap:6px">
          <button id="btn-select-all" class="btn btn-g btn-sm">Tout</button>
          <button id="btn-deselect-all" class="btn btn-g btn-sm">Aucun</button>
        </div>
      </div>
      <div style="padding:8px 10px;border-bottom:1px solid #30363d">
        <div style="position:relative">
          <svg style="position:absolute;left:9px;top:50%;-webkit-transform:translateY(-50%);transform:translateY(-50%);color:#8b949e;pointer-events:none" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input id="export-search" class="inp" style="padding-left:28px;font-size:12px;padding-top:7px;padding-bottom:7px" placeholder="Filtrer les sites…">
        </div>
      </div>
      <div id="export-site-list" style="max-height:380px;overflow-y:auto;padding:6px 0"></div>
      <div style="padding:8px 16px;border-top:1px solid #30363d;font-size:12px;color:#8b949e">
        <span id="export-selection-count">0 site(s) sélectionné(s)</span>
      </div>
    </div>

    <!-- Options -->
    <div style="-webkit-box-flex:0;-ms-flex:0 0 260px;flex:0 0 260px;display:-webkit-box;display:-ms-flexbox;display:flex;-webkit-box-orient:vertical;-webkit-box-direction:normal;-ms-flex-direction:column;flex-direction:column;gap:14px">

      <div style="background:#161b22;border:1px solid #30363d;border-radius:10px;padding:16px">
        <div style="font-size:13px;font-weight:600;color:#e6edf3;margin-bottom:12px">Format</div>
        <label style="display:-webkit-box;display:-ms-flexbox;display:flex;-webkit-box-align:center;-ms-flex-align:center;align-items:center;gap:8px;cursor:pointer;margin-bottom:8px;font-size:13px">
          <input type="radio" name="export-format" value="multi" checked style="accent-color:#58a6ff;width:14px;height:14px">
          Un onglet par site
        </label>
        <label style="display:-webkit-box;display:-ms-flexbox;display:flex;-webkit-box-align:center;-ms-flex-align:center;align-items:center;gap:8px;cursor:pointer;font-size:13px">
          <input type="radio" name="export-format" value="single" style="accent-color:#58a6ff;width:14px;height:14px">
          Tout en un seul onglet
        </label>
      </div>

      <div style="background:#161b22;border:1px solid #30363d;border-radius:10px;padding:16px">
        <div style="font-size:13px;font-weight:600;color:#e6edf3;margin-bottom:12px">Filtre statut</div>
        <select id="export-filter-status" class="inp" style="font-size:13px;padding:8px 12px;cursor:pointer">
          <option value="all">Tous les statuts</option>
          <option value="Libre">Libre uniquement</option>
          <option value="Utilisé">Utilisé uniquement</option>
          <option value="Réservée">Réservée uniquement</option>
        </select>
      </div>

      <div style="background:#161b22;border:1px solid #30363d;border-radius:10px;padding:16px">
        <div style="font-size:13px;font-weight:600;color:#e6edf3;margin-bottom:12px">Colonnes incluses</div>
        <div style="display:-webkit-box;display:-ms-flexbox;display:flex;-webkit-box-orient:vertical;-webkit-box-direction:normal;-ms-flex-direction:column;flex-direction:column;gap:7px">
          <label style="display:-webkit-box;display:-ms-flexbox;display:flex;-webkit-box-align:center;-ms-flex-align:center;align-items:center;gap:8px;cursor:pointer;font-size:13px">
            <input type="checkbox" id="col-site" checked disabled style="accent-color:#58a6ff;width:14px;height:14px"> Site
          </label>
          <label style="display:-webkit-box;display:-ms-flexbox;display:flex;-webkit-box-align:center;-ms-flex-align:center;align-items:center;gap:8px;cursor:pointer;font-size:13px">
            <input type="checkbox" id="col-vlan" checked style="accent-color:#58a6ff;width:14px;height:14px"> VLAN ID
          </label>
          <label style="display:-webkit-box;display:-ms-flexbox;display:flex;-webkit-box-align:center;-ms-flex-align:center;align-items:center;gap:8px;cursor:pointer;font-size:13px">
            <input type="checkbox" id="col-network" checked style="accent-color:#58a6ff;width:14px;height:14px"> Réseau
          </label>
          <label style="display:-webkit-box;display:-ms-flexbox;display:flex;-webkit-box-align:center;-ms-flex-align:center;align-items:center;gap:8px;cursor:pointer;font-size:13px">
            <input type="checkbox" id="col-ip" checked disabled style="accent-color:#58a6ff;width:14px;height:14px"> Adresse IP
          </label>
          <label style="display:-webkit-box;display:-ms-flexbox;display:flex;-webkit-box-align:center;-ms-flex-align:center;align-items:center;gap:8px;cursor:pointer;font-size:13px">
            <input type="checkbox" id="col-hostname" checked style="accent-color:#58a6ff;width:14px;height:14px"> Hostname
          </label>
          <label style="display:-webkit-box;display:-ms-flexbox;display:flex;-webkit-box-align:center;-ms-flex-align:center;align-items:center;gap:8px;cursor:pointer;font-size:13px">
            <input type="checkbox" id="col-status" checked style="accent-color:#58a6ff;width:14px;height:14px"> Statut
          </label>
          <label style="display:-webkit-box;display:-ms-flexbox;display:flex;-webkit-box-align:center;-ms-flex-align:center;align-items:center;gap:8px;cursor:pointer;font-size:13px">
            <input type="checkbox" id="col-gateway" style="accent-color:#58a6ff;width:14px;height:14px"> Gateway
          </label>
        </div>
      </div>

    </div>
  </div>

</main>

<script type="module" src="/js/export.js"></script>
</body>
</html>
