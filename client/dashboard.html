<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IPAM SIW — Tableau de bord</title>
  <link rel="stylesheet" href="/vendor/fonts.css">
  <link rel="stylesheet" href="/css/theme.css">
  <script src="/js/protect.js"></script>
  <script src="/vendor/tailwind.min.js"></script>
  <style>
    *{box-sizing:border-box}
    body{background:var(--bg-1);color:var(--tx-1);font-family:'Inter',system-ui,-apple-system,'Segoe UI',sans-serif;margin:0;height:100vh;overflow:hidden}
    ::-webkit-scrollbar{width:5px;height:5px}
    ::-webkit-scrollbar-track{background:var(--bg-1)}
    ::-webkit-scrollbar-thumb{background:var(--brd);border-radius:3px}
    ::-webkit-scrollbar-thumb:hover{background:#58a6ff55}
    *{scrollbar-width:thin;scrollbar-color:var(--brd) var(--bg-1)}
    .hidden{display:none!important}
    input,button{-webkit-appearance:none;appearance:none}
    input[type=checkbox],input[type=radio]{-webkit-appearance:auto;appearance:auto}
    .modal-overlay{position:fixed;top:0;right:0;bottom:0;left:0;background:rgba(0,0,0,.65);-webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px);z-index:200;display:-webkit-box;display:-ms-flexbox;display:flex;-webkit-box-align:center;-ms-flex-align:center;align-items:center;-webkit-box-pack:center;-ms-flex-pack:center;justify-content:center;padding:24px}
    .modal-box{background:var(--bg-4);border:1px solid var(--brd);border-radius:12px;padding:28px;width:420px;max-width:95vw;box-shadow:0 20px 60px rgba(0,0,0,.6);-webkit-animation:mfade .18s cubic-bezier(.34,1.56,.64,1);animation:mfade .18s cubic-bezier(.34,1.56,.64,1)}
    @-webkit-keyframes mfade{from{opacity:0;-webkit-transform:scale(.92) translateY(12px);transform:scale(.92) translateY(12px)}to{opacity:1;-webkit-transform:none;transform:none}}
    @keyframes mfade{from{opacity:0;transform:scale(.92) translateY(12px)}to{opacity:1;transform:none}}
    .inp{background:var(--bg-1);border:1px solid var(--brd);border-radius:8px;padding:10px 14px;color:var(--tx-1);font-size:14px;outline:none;width:100%;box-sizing:border-box;-webkit-transition:border-color .15s;transition:border-color .15s}
    .inp:focus{border-color:#58a6ff!important;-webkit-box-shadow:0 0 0 3px rgba(88,166,255,.15);box-shadow:0 0 0 3px rgba(88,166,255,.15)}
    .inp::placeholder{color:var(--tx-3)}
    .btn-p{background:#58a6ff;color:var(--bg-1);border:none;border-radius:8px;padding:9px 18px;font-size:13px;font-weight:500;cursor:pointer;-webkit-transition:background .15s;transition:background .15s}
    .btn-p:hover{background:#79b8ff}
    .btn-g{background:var(--bg-4);color:var(--tx-1);border:1px solid var(--brd);border-radius:8px;padding:9px 18px;font-size:13px;font-weight:500;cursor:pointer;-webkit-transition:background .15s;transition:background .15s}
    .btn-g:hover{background:var(--bg-hover)}
    input:focus{outline:none;border-color:#58a6ff!important;-webkit-box-shadow:0 0 0 3px rgba(88,166,255,.15);box-shadow:0 0 0 3px rgba(88,166,255,.15)}
    button:focus-visible{outline:2px solid #58a6ff;outline-offset:2px}
    #sites-grid{
      display:-webkit-box;display:-ms-flexbox;display:flex;
      -ms-flex-wrap:wrap;flex-wrap:wrap;gap:16px;
    }
    @supports (display:grid){
      #sites-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr))}
    }
    .site-card{-webkit-box-flex:1;-ms-flex:1 1 300px;flex:1 1 300px}
    .site-item{display:-webkit-box;display:-ms-flexbox;display:flex;-webkit-box-align:center;-ms-flex-align:center;align-items:center;-webkit-box-pack:justify;-ms-flex-pack:justify;justify-content:space-between;padding:9px 16px;border-left:2px solid transparent;-webkit-transition:all .1s;transition:all .1s;font-size:13px;color:var(--tx-2);text-decoration:none}
    .site-item:hover{background:var(--bg-3);color:var(--tx-1)}
    #sidebar{position:fixed;left:0;top:0;bottom:0;width:260px;background:var(--bg-2);border-right:1px solid var(--brd);display:-webkit-box;display:-ms-flexbox;display:flex;-webkit-box-orient:vertical;-webkit-box-direction:normal;-ms-flex-direction:column;flex-direction:column;z-index:10}
    #app-main{margin-left:260px;height:100vh;display:-webkit-box;display:-ms-flexbox;display:flex;-webkit-box-orient:vertical;-webkit-box-direction:normal;-ms-flex-direction:column;flex-direction:column;overflow:hidden}
    .ip-search-wrap{position:relative}
    .ip-search-dropdown{position:absolute;top:calc(100% + 4px);right:0;min-width:480px;background:var(--bg-2);border:1px solid var(--brd);border-radius:10px;box-shadow:0 8px 32px rgba(0,0,0,.35);z-index:100;max-height:360px;overflow-y:auto}
    .ip-search-row{display:flex;align-items:center;gap:10px;padding:9px 14px;border-bottom:1px solid var(--bg-4);text-decoration:none;transition:background .1s}
    .ip-search-row:last-child{border-bottom:none}
    .ip-search-row:hover{background:var(--bg-3)}
  </style>
</head>
<body>

        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Export Excel

      <a href="/archive.html" style="display:-webkit-box;display:-ms-flexbox;display:flex;-webkit-box-align:center;-ms-flex-align:center;align-items:center;gap:6px;width:100%;padding:8px 12px;border-radius:8px;text-decoration:none;font-size:13px;font-weight:500;color:var(--tx-3);background:var(--bg-4);border:1px solid var(--brd);margin-bottom:4px;-webkit-box-sizing:border-box;box-sizing:border-box;-webkit-transition:all .15s;transition:all .15s" onmouseenter="this.style.background='var(--bg-hover)'" onmouseleave="this.style.background='var(--bg-4)'">

        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12.01" y2="8"/><line x1="12" y1="12" x2="12" y2="16"/></svg>

      </a>
      <a href="/admin.html" id="nav-admin-link" class="hidden" style="display:-webkit-box;display:-ms-flexbox;display:flex;-webkit-box-align:center;-ms-flex-align:center;align-items:center;gap:6px;width:100%;padding:8px 12px;border-radius:8px;text-decoration:none;font-size:13px;font-weight:500;color:var(--tx-3);background:var(--bg-4);border:1px solid var(--brd);margin-top:4px;-webkit-box-sizing:border-box;box-sizing:border-box;-webkit-transition:all .15s;transition:all .15s" onmouseenter="this.style.background='var(--bg-hover)'" onmouseleave="this.style.background='var(--bg-4)'">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>

        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2"/></svg>

    <div style="padding:10px 10px 6px">
      <div style="position:relative">
        <svg style="position:absolute;left:10px;top:50%;-webkit-transform:translateY(-50%);transform:translateY(-50%);color:var(--tx-3);pointer-events:none" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input id="sidebar-search" class="inp" style="padding-left:30px;font-size:13px;padding-top:8px;padding-bottom:8px" placeholder="Rechercher un site…">
      </div>
    </div>

    <div id="site-list" style="-webkit-box-flex:1;-ms-flex:1;flex:1;overflow-y:auto"></div>

    <div style="padding:12px 14px;border-top:1px solid var(--brd)">
      <div style="display:-webkit-box;display:-ms-flexbox;display:flex;-webkit-box-align:center;-ms-flex-align:center;align-items:center;-webkit-box-pack:justify;-ms-flex-pack:justify;justify-content:space-between;background:var(--bg-1);border:1px solid var(--brd);border-radius:8px;padding:9px 11px">
        <div style="min-width:0">

        </div>
        <button id="btn-change-pw" title="Changer mon mot de passe" style="-ms-flex-negative:0;flex-shrink:0;margin-left:8px;padding:6px 10px;border-radius:6px;border:1px solid var(--brd);background:var(--bg-4);color:var(--tx-3);cursor:pointer;-webkit-appearance:none;appearance:none;-webkit-transition:all .15s;transition:all .15s;display:-webkit-inline-box;display:-ms-inline-flexbox;display:inline-flex;-webkit-box-align:center;-ms-flex-align:center;align-items:center" onmouseenter="this.style.background='var(--bg-hover)';this.style.color='var(--tx-1)'" onmouseleave="this.style.background='var(--bg-4)';this.style.color='var(--tx-3)'">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        </button>

        <button id="btn-logout" title="Déconnexion" style="-ms-flex-negative:0;flex-shrink:0;margin-left:4px;padding:6px 10px;border-radius:6px;border:1px solid #f8514940;background:#f8514918;color:#f85149;cursor:pointer;-webkit-appearance:none;appearance:none;-webkit-transition:all .15s;transition:all .15s;display:-webkit-inline-box;display:-ms-inline-flexbox;display:inline-flex;-webkit-box-align:center;-ms-flex-align:center;align-items:center" onmouseenter="this.style.background='#f8514930'" onmouseleave="this.style.background='#f8514918'">

  <!-- ══════════════════ MAIN ══════════════════ -->
  <div id="app-main">

      <div style="max-width:1280px;margin:0 auto">

    <!-- Title row -->
    <div style="display:-webkit-box;display:-ms-flexbox;display:flex;
                -webkit-box-align:center;-ms-flex-align:center;align-items:center;
                -webkit-box-pack:justify;-ms-flex-pack:justify;justify-content:space-between;
                margin-bottom:28px;-ms-flex-wrap:wrap;flex-wrap:wrap;gap:16px;">
      <div>
        <h2 style="color:var(--tx-1);font-size:20px;font-weight:700;margin:0;letter-spacing:-.02em;">Sites réseau</h2>
        <p id="site-count" style="color:var(--tx-3);font-size:13px;margin:4px 0 0;"></p>
      </div>

        </div>
      </div>

      </div>

  <!-- Password change modal -->
  <div id="modal-change-pw" class="modal-overlay hidden">
    <div class="modal-box">
      <div style="display:-webkit-box;display:-ms-flexbox;display:flex;-webkit-box-pack:justify;-ms-flex-pack:justify;justify-content:space-between;-webkit-box-align:center;-ms-flex-align:center;align-items:center;margin-bottom:20px">
        <div style="font-size:17px;font-weight:700;letter-spacing:-.02em">Changer mon mot de passe</div>

      </div>
      <form id="form-change-pw">
        <div style="margin-bottom:14px">
          <label style="font-size:13px;font-weight:500;display:block;margin-bottom:7px;color:var(--tx-1)">Mot de passe actuel</label>
          <input id="cpw-current" class="inp" type="password" required>
        </div>
        <div style="margin-bottom:14px">
          <label style="font-size:13px;font-weight:500;display:block;margin-bottom:7px;color:var(--tx-1)">Nouveau mot de passe <span style="color:#f85149">*</span></label>
          <input id="cpw-new" class="inp" type="password" minlength="8" required>
        </div>
        <div style="margin-bottom:20px">
          <label style="font-size:13px;font-weight:500;display:block;margin-bottom:7px;color:var(--tx-1)">Confirmer le nouveau mot de passe <span style="color:#f85149">*</span></label>
          <input id="cpw-confirm" class="inp" type="password" minlength="8" required>
