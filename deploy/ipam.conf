# ==============================================================================
# IPAM SIW v2 — Configuration Apache pour Rocky Linux 10
# Serveur : 218.16.185.50  |  Proxy → Node.js sur 127.0.0.1:3000
#
# Installation :
#   cp ipam.conf /etc/httpd/conf.d/ipam.conf
#   systemctl reload httpd
# ==============================================================================


# ==============================================================================
# VirtualHost HTTP (port 80) — Redirige vers HTTPS
# ==============================================================================
<VirtualHost *:80>
    ServerName 218.16.185.50

    RewriteEngine On
    RewriteRule ^ https://%{HTTP_HOST}%{REQUEST_URI} [L,R=301]

    ErrorLog  /var/log/httpd/ipam_error.log
    CustomLog /var/log/httpd/ipam_access.log combined
</VirtualHost>


# ==============================================================================
# VirtualHost HTTPS (port 443) — Site principal
# ==============================================================================
<VirtualHost *:443>
    ServerName 218.16.185.50

    # ── SSL / TLS ─────────────────────────────────────────────────────────────
    SSLEngine             on
    SSLCertificateFile    /etc/pki/tls/certs/ipam.crt
    SSLCertificateKeyFile /etc/pki/tls/private/ipam.key

    SSLProtocol           all -SSLv3 -TLSv1 -TLSv1.1
    SSLCipherSuite        ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:\
ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:\
ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:\
DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384
    SSLHonorCipherOrder   off
    SSLSessionTickets     off

    # Désactiver HTTP/2 — évite les erreurs 421 Misdirected Request (SNI mismatch)
    # lors de la réutilisation de connexion HTTP/2 avec un certificat sur IP.
    Protocols http/1.1

    # ── Reverse Proxy vers Node.js ────────────────────────────────────────────
    ProxyPreserveHost On
    ProxyRequests     Off

    # Bloquer l'accès direct aux fichiers sensibles
    <LocationMatch "^/(data|node_modules|server|deploy|\.env|package\.json|package-lock\.json|.*\.mjs|.*\.py|.*\.sh)">
        Require all denied
    </LocationMatch>

    # Tout le reste → Node.js
    ProxyPass        / http://127.0.0.1:3000/
    ProxyPassReverse / http://127.0.0.1:3000/

    # ── En-têtes de sécurité ──────────────────────────────────────────────────
    Header always set X-Frame-Options "DENY"
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-XSS-Protection "1; mode=block"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"

    # CSP : vendor/ et js/ servis localement — aucun CDN externe requis
    Header always set Content-Security-Policy "\
default-src 'self'; \
script-src 'self' 'unsafe-inline' 'unsafe-eval'; \
style-src 'self' 'unsafe-inline'; \
font-src 'self'; \
img-src 'self' data:; \
connect-src 'self'; \
frame-ancestors 'none'; \
form-action 'self'; \
base-uri 'self'; \
object-src 'none'"

    Header always set Permissions-Policy "\
camera=(), microphone=(), geolocation=(), payment=(), usb=(), \
interest-cohort=()"

    Header always unset X-Powered-By
    Header always unset Server

    # Pas de cache sur l'API et les pages HTML
    <LocationMatch "^/(api/|index\.html|dashboard\.html|site\.html|admin\.html|config\.html)?$">
        Header always set Cache-Control "no-store, no-cache, must-revalidate, private"
        Header always set Pragma "no-cache"
        Header always set Expires "0"
    </LocationMatch>

    # Cache autorisé pour les assets statiques (JS vendor, JS app)
    <LocationMatch "\.(js|css|woff2|woff|png|jpg|ico|svg)$">
        Header set Cache-Control "public, max-age=86400"
    </LocationMatch>

    ServerTokens Prod
    ServerSignature Off
    TimeOut 60

    ErrorLog  /var/log/httpd/ipam_error.log
    CustomLog /var/log/httpd/ipam_access.log combined

</VirtualHost>
