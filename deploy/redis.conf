# ==============================================================================
# IPAM SIW — Configuration Redis (production Rocky Linux 10)
# Copier vers : /etc/redis/redis.conf
#
# Redis écoute uniquement sur localhost — jamais exposé directement.
# ==============================================================================

# ── Réseau ────────────────────────────────────────────────────────────────────
bind 127.0.0.1
port 6379
protected-mode yes

# ── Authentification ──────────────────────────────────────────────────────────
# Décommentez et changez le mot de passe si Redis est accessible
# depuis un réseau interne (bonne pratique même en localhost)
# requirepass CHANGE_ME_STRONG_PASSWORD

# ── Persistance (RDB snapshot) ────────────────────────────────────────────────
# Sauvegarde automatique : si N clés changent en M secondes
save 900 1
save 300 10
save 60  10000

dbfilename ipam.rdb
dir /var/lib/redis

# ── Persistance (AOF — append-only file) ─────────────────────────────────────
appendonly yes
appendfilename "ipam.aof"
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# ── Mémoire ───────────────────────────────────────────────────────────────────
maxmemory 256mb
maxmemory-policy allkeys-lru

# ── Logs ──────────────────────────────────────────────────────────────────────
loglevel notice
logfile /var/log/redis/redis.log

# ── Sécurité ──────────────────────────────────────────────────────────────────
rename-command FLUSHALL ""
rename-command FLUSHDB  ""
rename-command DEBUG    ""
rename-command CONFIG   "CONFIG_IPAM_ADMIN"

# ── Performance ───────────────────────────────────────────────────────────────
tcp-keepalive 300
timeout 0
tcp-backlog 511
hz 10
